name: Publish to PyPI

# タグ push（v*）で PyPI に公開する。PyPI Trusted Publishing（OIDC）を使用し、
# API トークンを GitHub Secrets に保存しない。
# 事前に PyPI 側で trusted publisher（repo=alforge-labs/alpha-forge-mcp,
# workflow=publish.yml）を登録しておくこと。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run tests & lint
        run: |
          uv sync --extra dev
          uv run ruff check .
          uv run pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Trusted Publishing に必須
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build distribution
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
